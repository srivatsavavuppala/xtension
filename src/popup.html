<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Repo Summarizer</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="tree-overlay.css">
  <style>
    html, body {
      width: 380px;
      min-height: 500px;
      max-height: 620px;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none; width: 0; }
    #main {
      min-height: 500px;
      width: 380px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #ask-repo {
      margin: 0 16px 16px;
      background: var(--modal-bg);
      border-radius: 12px;
      border: 1px solid var(--modal-border);
      display: flex;
      flex-direction: column;
      max-height: 400px;
      overflow: hidden;
    }
    .ask-header { font-size: 15px; font-weight: 600; color: var(--modal-title); padding: 14px 16px 10px; border-bottom: 1px solid var(--modal-border); flex-shrink: 0; }
    .ask-input-container { display: flex; gap: 8px; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--modal-border); flex-shrink: 0; }
    #askInput { flex: 1; padding: 9px 11px; border-radius: 8px; border: 1px solid var(--modal-border); background: var(--popup-bg); color: var(--popup-text); font-size: 13px; outline: none; transition: border-color 0.2s; }
    #askInput:focus { border-color: var(--tab-active-color); }
    #askBtn { background: var(--tab-active-color) !important; color: white !important; padding: 9px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 38px; height: 38px; flex-shrink: 0; }
    #askResult { flex: 1; overflow-y: auto; padding: 14px; font-size: 13px; line-height: 1.6; min-height: 80px; max-height: 240px; scrollbar-width: none; -ms-overflow-style: none; }
    #askResult::-webkit-scrollbar { display: none; width: 0; }
  </style>
</head>
<body>
  <div class="aurora-mid"></div>
  <div id="main">
    <button id="history-icon" title="Menu">
      <span class="material-icons" style="font-size:18px;line-height:1;">more_vert</span>
    </button>
    <div class="hero">
      <div class="logo">
        <img src="../icons/icon48.png" alt="Xtension">
      </div>
      <h2>Repo Summarizer</h2>
      <p class="subtitle">AI-powered GitHub analysis</p>
    </div>
    <div class="action-stack">
      <button id="summarizeBtn">
        <span class="material-icons btn-icon">auto_awesome</span>
        Analyze Repository
      </button>
    </div>
    <div id="summary"></div>
    <div class="download-area">
      <button id="downloadBtn">
        <span class="material-icons btn-icon">file_download</span>
        Download Report
      </button>
      <button id="chat-icon" title="Chat with this repo">
        <img src="../icons/chat.png" alt="Chat">
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
